<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">

        <div class="qr-card p-4 shadow">

            <h4 class="fw-bold mb-4">QR Code Generator</h4>

            <form method="POST" class="d-flex flex-column flex-md-row gap-2">
                <input
                    type="text"
                    name="link"
                    class="form-control"
                    placeholder="Enter URL"
                    required>

                <div class="text-center">
                    <button type="submit" class="btn  butttn text-white px-4 d-md-block d-none">
                        Generate 
                    </button>
                    <button type="submit" class="btn  text-white px-4  butttn d-md-none d-block w-100">
                        Generate QR Code
                    </button>
                </div>
            </form>

            {% if qr_image %}

            <div class="text-center">
                <img
                    src="{{ url_for('static', filename=qr_image) }}"
                    class="img-fluid  qr-image mb-3 mt-3"
                    alt="QR Code">

                <div>
                    <a href="{{ url_for('static', filename=qr_image) }}"
                       class="btn butttn text-white w-100"
                       download>
                        Download QR Code
                    </a>
                </div>

            </div>

            {% endif %}

        </div>

    </div>
<footer>
    @mehak-quzah
</footer>
</body>
</html>
